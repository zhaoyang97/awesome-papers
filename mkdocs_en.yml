site_name: Awesome AI Papers
site_url: https://awesome.papernotes.org/en/
site_description: Deep interpretations of 100 classic AI papers — History, Failed Baselines, Idea Lineage, Modern Perspective
site_author: papernotes.org
copyright: >
  © 2025-2026 papernotes.org<br>
  <a href="https://github.com/zhaoyang97/awesome-papers">GitHub</a> ·
  <a href="https://papernotes.org/">paper-notes</a> ·
  <a href="https://en.papernotes.org/">paper-notes-en</a> ·
  <a href="https://github.com/zhaoyang97/papers-with-notes">papers-with-notes</a>
repo_url: https://github.com/zhaoyang97/awesome-papers
repo_name: Star on GitHub
docs_dir: docs_en

# Cross-language switcher links use absolute /... URLs that point to a sibling
# MkDocs build, which is intentional. Silence the default INFO warning for those.
validation:
  links:
    absolute_links: ignore

watch:
  - overrides
  - hooks

hooks:
  - hooks/set_build_date.py

theme:
  name: material
  language: en
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  alternate:
    - name: 中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en

